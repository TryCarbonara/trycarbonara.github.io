<html>
  <head>
    <title>Carbonara, Inc. | Reliably reduce the carbon footprint of your business.</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=default"></script>

    <link rel="stylesheet" type="text/css" href="./style.css" />
    <script type="module" src="./map.js"></script>
  </head>
  <body>
    <h3>Carbonara Explore | Geographical Emission {{ secrets.GOOGLE_MAPS_KEY }}</h3>
    <!--The div element for the map -->
    <div id="map"></div>

    <!-- 
     The `defer` attribute causes the callback to execute after the full HTML
     document has been parsed. For non-blocking uses, avoiding race conditions,
     and consistent behavior across browsers, consider loading using Promises
     with https://www.npmjs.com/package/@googlemaps/js-api-loader.
    -->
    <script
      src="https://maps.googleapis.com/maps/api/js?key={{ secrets.GOOGLE_MAPS_KEY }}&libraries=visualization"
      defer
    ></script>
  </body>
</html>
